<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Catálogo - Tienda Premium</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://unpkg.com/lenis@1.1.5/dist/lenis.css">
  <style>
    /* Specific styles for Shop page */
    .shop-header {
      padding: 12rem 2rem 4rem;
      text-align: center;
      background: var(--color-black);
    }
    
    .filters-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem 2rem;
      border-top: 1px solid var(--color-dark-gray);
      border-bottom: 1px solid var(--color-dark-gray);
      margin-bottom: 2rem;
      flex-wrap: wrap;
      gap: 1rem;
    }
    
    .filter-group {
      display: flex;
      gap: 1rem;
      align-items: center;
    }
    
    .filter-select {
      background: transparent;
      color: var(--color-white);
      border: 1px solid var(--color-dark-gray);
      padding: 0.5rem 1rem;
      font-family: var(--font-body);
      outline: none;
      cursor: pointer;
    }

    .shop-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 2px;
      background: var(--color-dark-gray);
      border: 1px solid var(--color-dark-gray);
    }
  </style>
</head>
<body>
  
  <div class="top-bar">ENVÍO GRATIS DESDE 60 €</div>

  <header>
    <div class="container header-inner">
      <ul class="nav-links">
        <li><a href="index.html">Inicio</a></li>
        <li><a href="tienda.html">Colecciones</a></li>
        <li><a href="sobre-nosotros.html">Sobre Nosotros</a></li>
      </ul>
      <div class="logo">HUBLOT MENS</div>
      <div class="header-icons">
        <svg viewBox="0 0 24 24" style="cursor:pointer;" onclick="alert('Buscador en desarrollo')"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
        <svg viewBox="0 0 24 24" style="cursor:pointer;" onclick="alert('Mi cuenta')"><path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
        <svg viewBox="0 0 24 24" style="cursor:pointer;" onclick="alert('Abriendo carrito...')"><path d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
      </div>
    </div>
  </header>

  <div class="shop-header">
    <h1 class="hero-title" style="font-size: 4rem;">TODA LA COLECCIÓN</h1>
  </div>

  <div class="container" style="margin-bottom: 6rem;">
    <div class="filters-bar">
      <div class="filter-group">
        <select class="filter-select" id="category-filter">
          <option value="all">Todas las Categorías</option>
          <option value="camisetas">Camisetas</option>
          <option value="sudaderas">Sudaderas</option>
          <option value="pantalones">Pantalones</option>
          <option value="gorras">Gorras</option>
          <option value="carteras">Carteras</option>
          <option value="corbatas">Corbatas</option>
        </select>
        <select class="filter-select">
          <option value="all">Talla</option>
          <option value="s">S</option>
          <option value="m">M</option>
          <option value="l">L</option>
        </select>
        <select class="filter-select">
          <option value="all">Color</option>
          <option value="black">Negro</option>
          <option value="white">Blanco</option>
        </select>
      </div>
      <div class="filter-group">
        <select class="filter-select">
          <option value="relevance">Recomendados</option>
          <option value="price-asc">Precio: Menor a Mayor</option>
          <option value="price-desc">Precio: Mayor a Menor</option>
          <option value="new">Novedades</option>
        </select>
      </div>
    </div>

    <div class="shop-grid" id="shop-container">
      <!-- Rendered via JS -->
    </div>
  </div>

  <footer>
    <div class="container">
      <div class="footer-bottom" style="border-top:none; padding-top:0;">
        &copy; 2026 Hublot Mens. Todos los derechos reservados.
      </div>
    </div>
  </footer>

  <script src="https://unpkg.com/lenis@1.1.5/dist/lenis.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
  
  <script src="js/data.js?v=10"></script>
  <script src="js/cart.js?v=10"></script>
  <script src="js/main.js?v=10"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const shopContainer = document.getElementById('shop-container');
      const categoryFilter = document.getElementById('category-filter');
      
      let allProducts = [];
      if (typeof catalog !== 'undefined') {
        Object.keys(catalog).forEach(cat => {
          catalog[cat].forEach(p => {
            allProducts.push({ ...p, category: cat });
          });
        });
      }

      function renderProducts(products) {
        shopContainer.innerHTML = '';
        products.forEach((product, index) => {
          const card = document.createElement('div');
          card.className = 'product-card shop-item';
          card.innerHTML = `
            <div class="product-img-wrap">
              <img src="${product.img}" alt="${product.name}" loading="lazy" style="cursor: pointer;" onclick="window.location.href='producto.html?id=${product.id}'">
            </div>
            <div class="product-info" style="cursor: pointer;" onclick="window.location.href='producto.html?id=${product.id}'">
              <h4 class="product-title">${product.name}</h4>
              <span class="product-price">${product.price.toFixed(2)} €</span>
            </div>
          `;
          shopContainer.appendChild(card);
        });

        // Entry animation (fade + y, stagger by row effectively)
        const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
        if (typeof gsap !== 'undefined' && !prefersReducedMotion) {
          gsap.fromTo('.shop-item', 
            { y: 50, opacity: 0 },
            { y: 0, opacity: 1, duration: 0.6, stagger: 0.1, ease: 'power2.out', overwrite: true }
          );
        }
      }

      // Initial render
      renderProducts(allProducts);

      // Filter logic
      categoryFilter.addEventListener('change', (e) => {
        const cat = e.target.value;
        if (cat === 'all') {
          renderProducts(allProducts);
        } else {
          renderProducts(allProducts.filter(p => p.category === cat));
        }
      });
    });
  </script>
</body>
</html>
