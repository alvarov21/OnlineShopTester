<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout | Tienda Premium</title>
  <link rel="stylesheet" href="css/style.css?v=6">
  <style>
    .checkout-container {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4rem;
      padding-top: 100px;
      margin-bottom: 4rem;
    }
    
    .checkout-form-section h2 {
      font-size: 2rem;
      margin-bottom: 2rem;
    }
    
    .form-group {
      margin-bottom: 1.5rem;
    }
    
    .form-group label {
      display: block;
      margin-bottom: 0.5rem;
      font-weight: 500;
      color: var(--color-dark-gray);
    }
    
    .form-group input {
      width: 100%;
      padding: 1rem;
      background: #111;
      border: 1px solid #333;
      color: var(--color-white);
      font-family: var(--font-body);
    }
    
    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
    }
    
    .checkout-summary {
      background: #0a0a0a;
      padding: 2.5rem;
      border: 1px solid #222;
      border-radius: 4px;
    }
    
    .checkout-summary h3 {
      font-size: 1.5rem;
      margin-bottom: 2rem;
      border-bottom: 1px solid #333;
      padding-bottom: 1rem;
    }
    
    .summary-item {
      display: flex;
      justify-content: space-between;
      margin-bottom: 1rem;
      align-items: center;
    }
    
    .summary-item img {
      width: 60px;
      height: 80px;
      object-fit: cover;
      margin-right: 1rem;
    }
    
    .summary-item-info {
      flex: 1;
    }
    
    .summary-title {
      font-weight: 500;
      font-size: 0.9rem;
    }
    
    .summary-qty {
      color: #999;
      font-size: 0.8rem;
      margin-top: 0.2rem;
    }
    
    .summary-price {
      font-weight: 600;
    }
    
    .summary-totals {
      margin-top: 2rem;
      padding-top: 1.5rem;
      border-top: 1px solid #333;
    }
    
    .summary-totals .row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 1rem;
      color: #999;
    }
    
    .summary-totals .total-row {
      display: flex;
      justify-content: space-between;
      margin-top: 1rem;
      padding-top: 1rem;
      border-top: 1px solid #333;
      color: var(--color-white);
      font-size: 1.2rem;
      font-weight: 600;
    }
    
    .payment-btn {
      width: 100%;
      margin-top: 2rem;
      font-size: 1rem;
      padding: 1.2rem;
    }
    
    @media (max-width: 768px) {
      .checkout-container {
        grid-template-columns: 1fr;
        gap: 2rem;
      }
    }
  </style>
</head>
<body>
  <!-- Header -->
  <header class="header">
    <a href="index.html" class="logo">LOGO</a>
    <nav class="nav-links">
      <a href="tienda.html">Novedades</a>
      <a href="tienda.html">Ropa</a>
      <a href="tienda.html">Accesorios</a>
      <a href="sobre-nosotros.html">La Marca</a>
    </nav>
    <div class="header-icons">
      <svg viewBox="0 0 24 24" style="cursor:pointer;" onclick="alert('Buscador en desarrollo')"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
      <svg viewBox="0 0 24 24" style="cursor:pointer;" onclick="alert('Mi cuenta')"><path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
      <svg viewBox="0 0 24 24" style="cursor:pointer;" onclick="alert('Abriendo carrito...')"><path d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
    </div>
  </header>

  <main class="container checkout-container">
    <div class="checkout-form-section">
      <h2>Datos de Envío</h2>
      <form id="checkout-form">
        <div class="form-row">
          <div class="form-group">
            <label>Nombre</label>
            <input type="text" id="fname" required>
          </div>
          <div class="form-group">
            <label>Apellidos</label>
            <input type="text" id="lname" required>
          </div>
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="email" required>
        </div>
        <div class="form-group">
          <label>Dirección</label>
          <input type="text" id="address" required>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Ciudad</label>
            <input type="text" id="city" required>
          </div>
          <div class="form-group">
            <label>Código Postal</label>
            <input type="text" id="zip" required>
          </div>
        </div>
        
        <h2 style="margin-top: 3rem; font-size: 1.5rem;">Método de Pago</h2>
        <div class="form-group" style="color: #999; font-size: 0.9rem; border: 1px dashed #333; padding: 2rem; text-align: center;">
           Aquí se incrustará la pasarela de pago segura (Stripe / PayPal).
        </div>
        
        <button type="submit" class="btn btn-light payment-btn">PROCEDER AL PAGO SEGURO</button>
        
        <div class="payment-methods" style="margin-top: 2rem;">
          <div class="secure-checkout">
            <svg viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" stroke-width="2" fill="none"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
            <span>Pago 100% Seguro</span>
          </div>
          <div class="payment-icons">
            <span class="pay-icon">VISA</span>
            <span class="pay-icon">MASTERCARD</span>
            <span class="pay-icon">AMEX</span>
            <span class="pay-icon">PAYPAL</span>
            <span class="pay-icon">APPLE PAY</span>
          </div>
        </div>
      </form>
    </div>
    
    <div>
      <div class="checkout-summary">
        <h3>Resumen de tu pedido</h3>
        <div id="checkout-items">
          <!-- Items will be injected here -->
        </div>
        
        <div class="summary-totals">
          <div class="row">
            <span>Subtotal</span>
            <span id="checkout-subtotal">0.00 €</span>
          </div>
          <div class="row">
            <span>Envío</span>
            <span>Gratis</span>
          </div>
          <div class="total-row">
            <span>Total a pagar</span>
            <span id="checkout-total">0.00 €</span>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="https://unpkg.com/lenis@1.1.5/dist/lenis.min.js"></script>
  <script src="js/data.js?v=11"></script>
  <script src="js/cart.js?v=11"></script>
  <script src="js/checkout.js?v=11"></script>
</body>
</html>
