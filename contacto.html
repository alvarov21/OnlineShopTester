<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contacto - Tienda Premium</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://unpkg.com/lenis@1.1.5/dist/lenis.css">
  <style>
    .contact-header { padding: 12rem 2rem 4rem; text-align: center; }
    .contact-form { max-width: 600px; margin: 0 auto 8rem; }
    .form-group { margin-bottom: 1.5rem; }
    .form-group label { display: block; margin-bottom: 0.5rem; font-family: var(--font-heading); font-size: 0.8rem; letter-spacing: 0.1em; text-transform: uppercase; }
    .form-control { width: 100%; background: transparent; border: 1px solid var(--color-dark-gray); padding: 1rem; color: var(--color-white); font-family: var(--font-body); outline: none; transition: border-color 0.3s; }
    .form-control:focus { border-color: var(--color-white); }
    textarea.form-control { resize: vertical; min-height: 150px; }
  </style>
</head>
<body>
  <header class="scrolled">
    <div class="container header-inner">
      <ul class="nav-links">
        <li><a href="index.html">Inicio</a></li>
        <li><a href="faq.html">FAQ</a></li>
      </ul>
      <div class="logo">HUBLOT MENS</div>
    </div>
  </header>

  <div class="contact-header">
    <h1 class="hero-title" style="font-size: 4rem;">CONTACTO</h1>
    <p style="color: #999; margin-top: 1rem;">Estamos aquí para ayudarte. Escríbenos.</p>
  </div>
  
  <div class="container">
    <form class="contact-form">
      <div class="form-group">
        <label>Nombre</label>
        <input type="text" class="form-control" placeholder="Tu nombre">
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" class="form-control" placeholder="tu@email.com">
      </div>
      <div class="form-group">
        <label>Mensaje</label>
        <textarea class="form-control" placeholder="¿En qué podemos ayudarte?"></textarea>
      </div>
      <button type="button" class="btn btn-light" style="width: 100%; border-color: var(--color-white); color: var(--color-white);">ENVIAR MENSAJE</button>
    </form>
  </div>

  <script src="https://unpkg.com/lenis@1.1.5/dist/lenis.min.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
